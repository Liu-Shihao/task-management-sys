server:
  port: 8080

spring:
  application:
    name: finblock-task-management-sys
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/finblock_tms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        globally_quoted_identifiers: true
        jdbc:
          time_zone: Asia/Shanghai
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.finblock.tms: INFO
    org.springframework.web: INFO

app:
  auth:
    header-name: X-API-TOKEN
  upload:
    storage-dir: ${UPLOAD_DIR:./data/uploads}
    max-size-bytes: ${UPLOAD_MAX_SIZE_BYTES:20971520} # 20MB
  integrations:
    jenkins:
      base-url: ${JENKINS_BASE_URL:http://localhost:8081}
      username: ${JENKINS_USERNAME:}
      api-token: ${JENKINS_API_TOKEN:}
    ansible:
      base-url: ${ANSIBLE_BASE_URL:http://localhost:8082}
      api-token: ${ANSIBLE_API_TOKEN:}
