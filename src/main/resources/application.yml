server:
  port: 8080

spring:
  application:
    name: task-management-sys
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  
  # H2 内存数据库（开发模式）
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  
  # H2 Console（开发调试）
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.taskmanagement: INFO
    org.springframework.web: INFO
